<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CoinCrush — Match & Earn</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{touch-action:manipulation;user-select:none;-webkit-user-select:none;}
body{background:#0a0e1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow-x:hidden;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.coin-cell{transition:transform 0.12s ease,filter 0.12s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.coin-cell.sel{transform:scale(1.2);filter:brightness(1.5) drop-shadow(0 0 10px #fff9);}
.coin-cell.mat{animation:pop 0.4s ease forwards;}
.btn1{background:linear-gradient(135deg,#627EEA,#8B5CF6);border:none;color:#fff;padding:14px;border-radius:30px;font-weight:700;font-size:16px;cursor:pointer;width:100%;box-shadow:0 4px 20px #627EEA44;}
.btn2{background:transparent;border:1.5px solid #475569;color:#cbd5e1;padding:12px;border-radius:30px;font-weight:600;font-size:14px;cursor:pointer;width:100%;}
.nbtn{background:transparent;border:none;color:#94a3b8;font-size:13px;cursor:pointer;padding:6px 12px;border-radius:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

const COINS=[
  {id:"BTC",color:"#F7931A",symbol:"₿"},
  {id:"ETH",color:"#627EEA",symbol:"Ξ"},
  {id:"DOGE",color:"#C3A634",symbol:"Ð"},
  {id:"LTC",color:"#BFBBBB",symbol:"Ł"},
  {id:"TRX",color:"#EF0027",symbol:"T"},
  {id:"USDT",color:"#26A17B",symbol:"₮"},
];
const GS=8;
const LEVELS=[
  {level:1,target:500,moves:20,label:"Rookie Trader"},
  {level:2,target:1200,moves:22,label:"Market Watcher"},
  {level:3,target:2200,moves:24,label:"Crypto Analyst"},
  {level:4,target:3500,moves:26,label:"Bull Runner"},
  {level:5,target:5500,moves:28,label:"Whale Hunter"},
  {level:6,target:8000,moves:30,label:"DeFi Master"},
  {level:7,target:11000,moves:32,label:"Blockchain God"},
];

const rc=()=>COINS[Math.floor(Math.random()*COINS.length)].id;

function makeGrid(){
  const g=[];
  for(let r=0;r<GS;r++){
    const row=[];
    for(let c=0;c<GS;c++){
      let id;
      do{id=rc();}while(
        (c>=2&&row[c-1]===id&&row[c-2]===id)||
        (r>=2&&g[r-1]&&g[r-1][c]===id&&g[r-2]&&g[r-2][c]===id)
      );
      row.push(id);
    }
    g.push(row);
  }
  return g;
}

function findMatches(g){
  const m=Array.from({length:GS},()=>Array(GS).fill(false));
  for(let r=0;r<GS;r++)
    for(let c=0;c<GS-2;c++)
      if(g[r][c]&&g[r][c]===g[r][c+1]&&g[r][c]===g[r][c+2]){
        let e=c+2;while(e+1<GS&&g[r][e+1]===g[r][c])e++;
        for(let k=c;k<=e;k++)m[r][k]=true;
      }
  for(let c=0;c<GS;c++)
    for(let r=0;r<GS-2;r++)
      if(g[r][c]&&g[r][c]===g[r+1][c]&&g[r][c]===g[r+2][c]){
        let e=r+2;while(e+1<GS&&g[e+1][c]===g[r][c])e++;
        for(let k=r;k<=e;k++)m[k][c]=true;
      }
  return m;
}

const countM=m=>m.flat().filter(Boolean).length;

function gravity(g){
  const ng=g.map(r=>[...r]);
  for(let c=0;c<GS;c++){
    let e=GS-1;
    for(let r=GS-1;r>=0;r--){
      if(ng[r][c]!==null){ng[e][c]=ng[r][c];if(e!==r)ng[r][c]=null;e--;}
    }
    for(let r=e;r>=0;r--)ng[r][c]=rc();
  }
  return ng;
}

function removeM(g,m){return g.map((row,r)=>row.map((cell,c)=>m[r][c]?null:cell));}

function CoinIcon({coinId,size=38,sel=false}){
  const coin=COINS.find(c=>c.id===coinId);
  if(!coin)return null;
  return(
    <div style={{
      width:size,height:size,borderRadius:"50%",
      background:`radial-gradient(circle at 35% 35%,${coin.color}ee,${coin.color}99)`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*0.38,fontWeight:700,color:"#fff",
      border:`2.5px solid ${sel?"#fff":coin.color}`,
      boxShadow:sel?`0 0 16px 6px ${coin.color},0 0 6px #fff`:`0 2px 8px ${coin.color}55`,
      flexShrink:0,pointerEvents:"none",
    }}>{coin.symbol}</div>
  );
}

function App(){
  const [scr,setScr]=useState("menu");
  const [grid,setGrid]=useState(makeGrid);
  const [sel,setSel]=useState(null);
  const [mat,setMat]=useState(null);
  const [busy,setBusy]=useState(false);
  const [score,setScore]=useState(0);
  const [moves,setMoves]=useState(20);
  const [combo,setCombo]=useState(0);
  const [lvIdx,setLvIdx]=useState(0);
  const [parts,setParts]=useState([]);
  const [pts,setPts]=useState(()=>{try{return+localStorage.getItem("cp")||0;}catch{return 0;}});
  const [streak,setStreak]=useState(()=>{try{return+localStorage.getItem("cs")||0;}catch{return 0;}});
  const [claimed,setClaimed]=useState(()=>{try{return localStorage.getItem("cd")===new Date().toDateString();}catch{return false;}});
  const [hi,setHi]=useState(()=>{try{return+localStorage.getItem("ch")||0;}catch{return 0;}});
  const [toast,setToast]=useState(null);
  const [spinDeg,setSpinDeg]=useState(0);
  const [spinning,setSpinning]=useState(false);
  const [spinRes,setSpinRes]=useState(null);
  const [showAd,setShowAd]=useState(false);
  const [adCb,setAdCb]=useState(null);
  const [adDone,setAdDone]=useState(false);
  const pid=useRef(0);
  const tto=useRef(null);
  const lv=LEVELS[lvIdx]||LEVELS[LEVELS.length-1];

  const savePts=p=>{setPts(p);try{localStorage.setItem("cp",p);}catch{}};
  const showToast=(msg,color="#26A17B")=>{
    if(tto.current)clearTimeout(tto.current);
    setToast({msg,color});
    tto.current=setTimeout(()=>setToast(null),2200);
  };

  const spawnP=useCallback((r,c,coinId,n=8)=>{
    const coin=COINS.find(x=>x.id===coinId);
    const id=++pid.current;
    const np=Array.from({length:n},(_,i)=>({
      id:`${id}-${i}`,color:coin?.color||"#fff",
      x:(c+0.5)/GS*100,y:(r+0.5)/GS*100,
      vx:(Math.random()-0.5)*10,vy:(Math.random()-0.9)*10,
    }));
    setParts(p=>[...p,...np]);
    setTimeout(()=>setParts(p=>p.filter(x=>!np.find(n=>n.id===x.id))),900);
  },[]);

  const process=useCallback(async(g,cb=0)=>{
    const m=findMatches(g);
    const cnt=countM(m);
    if(cnt===0){setCombo(0);setBusy(false);return;}
    setMat(m);
    for(let r=0;r<GS;r++)for(let c=0;c<GS;c++)if(m[r][c])spawnP(r,c,g[r][c],cb>0?12:7);
    const p=Math.round(cnt*100*Math.pow(1.5,cb));
    setScore(s=>s+p);
    setCombo(cb+1);
    if(cb>0)showToast(`🔥 ${cb+1}x COMBO! +${p}`,"#F7931A");
    await new Promise(r=>setTimeout(r,420));
    setMat(null);
    const cl=removeM(g,m);
    await new Promise(r=>setTimeout(r,80));
    const dr=gravity(cl);
    setGrid(dr);
    await new Promise(r=>setTimeout(r,300));
    return process(dr,cb+1);
  },[spawnP]);

  // FIXED: Handle cell tap with both touch and click
  const handleTap=useCallback((r,c)=>{
    if(busy)return;
    if(!sel){
      setSel([r,c]);
      return;
    }
    const[sr,sc]=sel;
    // Same cell tapped again - deselect
    if(sr===r&&sc===c){setSel(null);return;}
    setSel(null);
    const dr=Math.abs(r-sr),dc=Math.abs(c-sc);
    // Not adjacent
    if(dr+dc!==1){setSel([r,c]);return;}
    // Try swap
    const ng=grid.map(row=>[...row]);
    [ng[sr][sc],ng[r][c]]=[ng[r][c],ng[sr][sc]];
    if(countM(findMatches(ng))===0){
      // Invalid - select new cell
      setSel([r,c]);
      return;
    }
    setMoves(m=>m-1);
    setBusy(true);
    setGrid(ng);
    process(ng,0).then(()=>setBusy(false));
  },[busy,sel,grid,process]);

  useEffect(()=>{
    if(scr!=="game")return;
    if(score>=lv.target&&!busy){
      const nh=Math.max(hi,score);setHi(nh);try{localStorage.setItem("ch",nh);}catch{}
      savePts(pts+Math.floor(score/100));
      setTimeout(()=>setScr("win"),500);
    }else if(moves<=0&&!busy){
      setTimeout(()=>setScr("lose"),500);
    }
  },[score,moves,busy,scr]);

  const startGame=(idx=lvIdx)=>{
    setLvIdx(idx);const l=LEVELS[idx]||LEVELS[LEVELS.length-1];
    setGrid(makeGrid());setScore(0);setMoves(l.moves);setCombo(0);
    setMat(null);setSel(null);setBusy(false);setParts([]);setAdDone(false);
    setScr("game");
  };

  const claimDaily=()=>{
    const b=50+streak*10;savePts(pts+b);
    const ns=streak+1;setStreak(ns);setClaimed(true);
    try{localStorage.setItem("cd",new Date().toDateString());localStorage.setItem("cs",ns);}catch{}
    showToast(`🎁 +${b} points! Day ${ns}!`);
  };

  const doSpin=()=>{
    if(spinning)return;
    const prizes=[50,100,25,200,75,150,30,300];
    const i=Math.floor(Math.random()*prizes.length);
    setSpinning(true);setSpinRes(null);
    setSpinDeg(d=>d+1440+(i/prizes.length)*360);
    setTimeout(()=>{setSpinning(false);setSpinRes(prizes[i]);savePts(pts+prizes[i]);showToast(`🎰 +${prizes[i]} points!`);},2800);
  };

  const watchAd=cb=>{setShowAd(true);setAdCb(()=>cb);};
  const finishAd=()=>{setShowAd(false);setAdDone(true);if(adCb)adCb();setAdCb(null);showToast("🎉 Reward claimed!","#627EEA");};

  const prog=Math.min(score/lv.target,1);
  const wPrizes=[50,100,25,200,75,150,30,300];
  const wColors=["#F7931A","#627EEA","#26A17B","#EF0027","#C3A634","#BFBBBB","#F7931A","#627EEA"];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0e1a,#111827,#0f172a)",display:"flex",flexDirection:"column",alignItems:"center",position:"relative",overflowX:"hidden"}}>

      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 20px",borderRadius:30,fontWeight:700,fontSize:14,zIndex:9999,whiteSpace:"nowrap",animation:"toastIn 0.3s ease"}}>{toast.msg}</div>}

      {showAd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#1e293b",borderRadius:20,padding:28,width:"100%",maxWidth:320,border:"1px solid #334155",textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:10}}>📺</div>
          <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>Watch Ad</div>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:18}}>Watch to earn your reward!</div>
          <div style={{background:"#0f172a",borderRadius:10,height:80,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontSize:12}}>[Ad Space]</div>
          <button className="btn1" onClick={finishAd}>✓ Claim Reward</button>
        </div>
      </div>}

      {/* MENU */}
      {scr==="menu"&&<div style={{width:"100%",maxWidth:430,padding:"24px 14px"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {["BTC","ETH","DOGE","LTC","TRX","USDT"].map((id,i)=>(
              <div key={id} style={{animation:`float ${1.4+i*0.2}s ease-in-out infinite`,animationDelay:`${i*0.15}s`}}>
                <CoinIcon coinId={id} size={32}/>
              </div>
            ))}
          </div>
          <div style={{fontSize:32,fontWeight:900,background:"linear-gradient(135deg,#F7931A,#627EEA,#26A17B)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CoinCrush</div>
          <div style={{color:"#64748b",fontSize:12,marginTop:2}}>Match. Earn. HODL 🚀</div>
        </div>

        <div style={{background:"#1e293b",borderRadius:14,padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-around",border:"1px solid #334155"}}>
          {[["Points",pts.toLocaleString(),"#26A17B"],["Streak","🔥"+streak+"d","#F7931A"],["Best",hi.toLocaleString(),"#627EEA"]].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"center"}}><div style={{color:"#64748b",fontSize:11}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:18}}>{v}</div></div>
          ))}
        </div>

        {!claimed&&<div onTouchEnd={e=>{e.preventDefault();claimDaily();}} onClick={claimDaily} style={{background:"linear-gradient(135deg,#1e3a1f,#14532d)",border:"1px solid #16a34a",borderRadius:14,padding:"12px 14px",marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:26}}>🎁</div>
          <div><div style={{fontWeight:700,color:"#4ade80",fontSize:14}}>Daily Reward!</div><div style={{color:"#86efac",fontSize:12}}>Tap → +{50+streak*10} points</div></div>
        </div>}

        <div style={{marginBottom:16}}>
          <div style={{color:"#94a3b8",fontSize:11,marginBottom:8,fontWeight:600,letterSpacing:1}}>SELECT LEVEL</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {LEVELS.map((l,i)=>(
              <div key={i} onTouchEnd={e=>{e.preventDefault();setLvIdx(i);startGame(i);}} onClick={()=>{setLvIdx(i);startGame(i);}} style={{background:i===lvIdx?"linear-gradient(135deg,#627EEA,#8B5CF6)":"#1e293b",border:i===lvIdx?"none":"1px solid #334155",borderRadius:10,padding:"8px 4px",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:14}}>{["🐣","📈","🔍","🐂","🐋","🌐","⛓"][i]}</div>
                <div style={{fontSize:10,fontWeight:700,marginTop:1,color:"#fff"}}>Lv.{l.level}</div>
              </div>
            ))}
          </div>
        </div>

        <div onTouchEnd={e=>{e.preventDefault();startGame(lvIdx);}} onClick={()=>startGame(lvIdx)} className="btn1" style={{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🚀 Play Level {lv.level}</div>
        <div style={{display:"flex",gap:8}}>
          {[["🎰","Spin","spin"],["🏆","Ranks","leaderboard"],["💸","Cash","withdraw"]].map(([ic,lb,sc])=>(
            <div key={sc} onTouchEnd={e=>{e.preventDefault();setScr(sc);}} onClick={()=>setScr(sc)} className="btn2" style={{flex:1,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{ic} {lb}</div>
          ))}
        </div>
      </div>}

      {/* GAME */}
      {scr==="game"&&<div style={{width:"100%",maxWidth:430,padding:"8px 8px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="nbtn">← Menu</div>
          <div style={{fontWeight:800,color:"#627EEA",fontSize:13}}>Lv.{lv.level}: {lv.label}</div>
          <div style={{color:"#64748b",fontSize:12}}>⭐{score.toLocaleString()}</div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {[["SCORE",score.toLocaleString(),"#26A17B"],["MOVES",moves,moves<=5?"#EF0027":"#F7931A"],["COMBO","x"+Math.max(combo,1),"#627EEA"]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:"#1e293b",borderRadius:10,padding:"8px",border:"1px solid #334155",textAlign:"center"}}>
              <div style={{color:"#64748b",fontSize:9,letterSpacing:1}}>{l}</div>
              <div style={{color:c,fontWeight:800,fontSize:16}}>{v}</div>
            </div>
          ))}
        </div>

        <div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:2}}>
            <span>Progress</span><span>{Math.round(prog*100)}% / {lv.target.toLocaleString()}</span>
          </div>
          <div style={{background:"#1e293b",borderRadius:99,height:6,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:99,width:`${prog*100}%`,background:"linear-gradient(90deg,#627EEA,#26A17B)",transition:"width 0.5s"}}/>
          </div>
        </div>

        {/* GRID — touch fixed */}
        <div style={{position:"relative",borderRadius:12,overflow:"hidden",border:"1px solid #1e3a5f",background:"#0a0f1e",padding:4}}>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${GS},1fr)`,gap:3}}>
            {grid.map((row,r)=>row.map((coinId,c)=>{
              const isSel=sel&&sel[0]===r&&sel[1]===c;
              const isMat=mat&&mat[r][c];
              return(
                <div
                  key={`${r}-${c}`}
                  className={`coin-cell${isSel?" sel":""}${isMat?" mat":""}`}
                  onTouchEnd={e=>{e.preventDefault();e.stopPropagation();handleTap(r,c);}}
                  onClick={()=>handleTap(r,c)}
                  style={{
                    aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",
                    background:isSel?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.03)",
                    borderRadius:8,
                    border:isSel?"1px solid rgba(255,255,255,0.4)":"1px solid transparent",
                  }}
                >
                  {coinId&&<CoinIcon coinId={coinId} size={Math.min(window.innerWidth/GS-10,40)} sel={isSel}/>}
                </div>
              );
            }))}
          </div>

          {parts.map(p=>(
            <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:`${p.y}%`,width:7,height:7,borderRadius:"50%",background:p.color,pointerEvents:"none",animation:"pfly 0.9s ease forwards","--tx":`${p.vx*14}px`,"--ty":`${p.vy*14}px`,boxShadow:`0 0 5px ${p.color}`}}/>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginTop:8}}>
          <div onTouchEnd={e=>{e.preventDefault();watchAd(()=>setMoves(m=>m+5));}} onClick={()=>watchAd(()=>setMoves(m=>m+5))} className="btn2" style={{flex:1,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>📺 +5 Moves</div>
          <div onTouchEnd={e=>{e.preventDefault();watchAd(()=>setScore(s=>s+Math.floor(lv.target*0.2)));}} onClick={()=>watchAd(()=>setScore(s=>s+Math.floor(lv.target*0.2)))} className="btn2" style={{flex:1,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>📺 Boost</div>
        </div>
      </div>}

      {/* WIN */}
      {scr==="win"&&<div style={{width:"100%",maxWidth:430,padding:"32px 16px",textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:8,animation:"float 2s ease-in-out infinite"}}>🏆</div>
        <div style={{fontSize:26,fontWeight:900,background:"linear-gradient(135deg,#F7931A,#ffd700)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>LEVEL CLEARED!</div>
        <div style={{color:"#94a3b8",marginBottom:18,fontSize:14}}>Level {lv.level} — {lv.label}</div>
        <div style={{background:"#1e293b",borderRadius:14,padding:18,marginBottom:16,border:"1px solid #334155",display:"flex",justifyContent:"space-around"}}>
          <div><div style={{color:"#64748b",fontSize:11}}>Score</div><div style={{color:"#26A17B",fontWeight:800,fontSize:20}}>{score.toLocaleString()}</div></div>
          <div><div style={{color:"#64748b",fontSize:11}}>Earned</div><div style={{color:"#F7931A",fontWeight:800,fontSize:20}}>+{Math.floor(score/100)} pts</div></div>
        </div>
        {!adDone&&<div style={{background:"#1e1a3a",border:"1px solid #7c3aed",borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{color:"#c4b5fd",fontWeight:700,marginBottom:8,fontSize:13}}>🎬 Watch Ad for 2× Reward!</div>
          <div onTouchEnd={e=>{e.preventDefault();watchAd(()=>{savePts(pts+Math.floor(score/50));showToast("2× Reward! 🎉");});}} onClick={()=>watchAd(()=>{savePts(pts+Math.floor(score/50));showToast("2× Reward! 🎉");})} className="btn1">📺 Double Points</div>
        </div>}
        <div onTouchEnd={e=>{e.preventDefault();lvIdx<LEVELS.length-1?startGame(lvIdx+1):startGame(lvIdx);}} onClick={()=>lvIdx<LEVELS.length-1?startGame(lvIdx+1):startGame(lvIdx)} className="btn1" style={{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center"}}>▶ Next Level</div>
        <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="btn2" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>← Main Menu</div>
      </div>}

      {/* LOSE */}
      {scr==="lose"&&<div style={{width:"100%",maxWidth:430,padding:"32px 16px",textAlign:"center"}}>
        <div style={{fontSize:54,marginBottom:8}}>😢</div>
        <div style={{fontSize:24,fontWeight:900,color:"#EF0027",marginBottom:4}}>OUT OF MOVES!</div>
        <div style={{color:"#94a3b8",marginBottom:18}}>Score: {score.toLocaleString()} / {lv.target.toLocaleString()}</div>
        {!adDone&&<div style={{background:"#1e1a3a",border:"1px solid #7c3aed",borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{color:"#c4b5fd",fontWeight:700,marginBottom:8,fontSize:13}}>💪 Get +5 Moves to Continue?</div>
          <div onTouchEnd={e=>{e.preventDefault();watchAd(()=>{setMoves(5);setScr("game");});}} onClick={()=>watchAd(()=>{setMoves(5);setScr("game");})} className="btn1">📺 Watch Ad — Continue!</div>
        </div>}
        <div onTouchEnd={e=>{e.preventDefault();startGame(lvIdx);}} onClick={()=>startGame(lvIdx)} className="btn1" style={{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center"}}>🔄 Retry</div>
        <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="btn2" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>← Menu</div>
      </div>}

      {/* SPIN */}
      {scr==="spin"&&<div style={{width:"100%",maxWidth:430,padding:"18px 14px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:18}}>
          <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="nbtn">← Back</div>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>🎰 Lucky Spin</div>
        </div>
        <div style={{position:"relative",width:240,height:240,margin:"0 auto 18px",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="240" height="240" viewBox="0 0 240 240" style={{transform:`rotate(${spinDeg}deg)`,transition:spinning?"transform 2.5s cubic-bezier(.17,.67,.12,.99)":"none"}}>
            {wPrizes.map((prize,i)=>{
              const a=(2*Math.PI)/wPrizes.length,sa=i*a-Math.PI/2,ea=sa+a;
              const r=108,cx=120,cy=120;
              const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
              const ma=(sa+ea)/2,tx=cx+74*Math.cos(ma),ty=cy+74*Math.sin(ma);
              return(<g key={i}><path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`} fill={wColors[i]} opacity="0.9"/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="central" fill="#fff" fontSize="11" fontWeight="700">{prize}</text></g>);
            })}
            <circle cx="120" cy="120" r="16" fill="#0f172a"/><circle cx="120" cy="120" r="12" fill="#627EEA"/>
          </svg>
          <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"8px solid transparent",borderRight:"8px solid transparent",borderTop:"20px solid #F7931A"}}/>
        </div>
        {spinRes&&<div style={{background:"#1e293b",borderRadius:12,padding:12,marginBottom:16,border:"1px solid #26A17B"}}><span style={{color:"#4ade80",fontWeight:800,fontSize:16}}>🎉 Won +{spinRes} points!</span></div>}
        <div onTouchEnd={e=>{e.preventDefault();doSpin();}} onClick={doSpin} className="btn1" style={{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center"}}>{spinning?"Spinning...":"🎰 Free Spin"}</div>
        <div onTouchEnd={e=>{e.preventDefault();watchAd(doSpin);}} onClick={()=>watchAd(doSpin)} className="btn2" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>📺 Extra Spin (Watch Ad)</div>
      </div>}

      {/* LEADERBOARD */}
      {scr==="leaderboard"&&<div style={{width:"100%",maxWidth:430,padding:"18px 14px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:18}}>
          <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="nbtn">← Back</div>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>🏆 Leaderboard</div>
        </div>
        {[{name:"CryptoKing99",p:48200,s:14,f:"🇺🇸"},{name:"BTCWhale",p:41000,s:9,f:"🇬🇧"},{name:"ETHmaxi",p:38750,s:7,f:"🇩🇪"},{name:"DogeArmy",p:31200,s:12,f:"🇧🇷"},{name:"SatoshiMaster",p:28600,s:5,f:"🇯🇵"},{name:"You",p:pts,s:streak,f:"⭐"}].sort((a,b)=>b.p-a.p).map((u,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:u.name==="You"?"#1e293b":"#111827",border:`1px solid ${u.name==="You"?"#627EEA":"#1e293b"}`,borderRadius:12,padding:"10px 14px",marginBottom:7}}>
            <div style={{width:24,fontWeight:800,fontSize:13,color:["#FFD700","#C0C0C0","#CD7F32"][i]||"#64748b"}}>{i<3?["🥇","🥈","🥉"][i]:`#${i+1}`}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{u.f} {u.name}</div><div style={{color:"#64748b",fontSize:11}}>🔥{u.s}d streak</div></div>
            <div style={{color:"#26A17B",fontWeight:800,fontSize:13}}>{u.p.toLocaleString()}</div>
          </div>
        ))}
      </div>}

      {/* WITHDRAW */}
      {scr==="withdraw"&&<div style={{width:"100%",maxWidth:430,padding:"18px 14px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:18}}>
          <div onTouchEnd={e=>{e.preventDefault();setScr("menu");}} onClick={()=>setScr("menu")} className="nbtn">← Back</div>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>💸 Withdraw</div>
        </div>
        <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:14,border:"1px solid #334155"}}>
          <div style={{color:"#64748b",fontSize:12}}>Balance</div>
          <div style={{fontSize:24,fontWeight:900,color:"#26A17B"}}>{pts.toLocaleString()} pts</div>
          <div style={{color:"#64748b",fontSize:12}}>≈ ${(pts/10000*0.1).toFixed(4)} USD</div>
        </div>
        <div style={{background:"#1e1a20",borderRadius:12,padding:14,marginBottom:14,border:"1px solid #EF002744"}}>
          <div style={{color:"#fca5a5",fontSize:13,fontWeight:700,marginBottom:6}}>📋 Via FaucetPay Only</div>
          <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.9}}>• DOGE: min 1.00 (5,000 pts)<br/>• LTC: min 0.001 (8,000 pts)<br/>• TRX: min 5.00 (6,000 pts)<br/>• Admin approval within 24h</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {["DOGE","LTC","TRX"].map(id=>(
            <div key={id} style={{flex:1,background:"#1e293b",borderRadius:10,padding:10,textAlign:"center",border:"1px solid #334155",cursor:"pointer"}}>
              <CoinIcon coinId={id} size={26}/><div style={{fontSize:11,marginTop:4,fontWeight:700}}>{id}</div>
            </div>
          ))}
        </div>
        <input placeholder="FaucetPay wallet address" style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",color:"#fff",fontSize:13,outline:"none",marginBottom:10}}/>
        <div onTouchEnd={e=>{e.preventDefault();if(pts<5000){showToast("Need 5,000 points min!","#EF0027");return;}showToast("Submitted! Review in 24h ⏳","#F7931A");}} onClick={()=>{if(pts<5000){showToast("Need 5,000 points min!","#EF0027");return;}showToast("Submitted! Review in 24h ⏳","#F7931A");}} className="btn1" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>Submit Withdrawal</div>
      </div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
