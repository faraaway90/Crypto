<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CryptoMatch — Match & Earn</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow-x:hidden;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.coin-cell{transition:transform 0.15s cubic-bezier(.34,1.56,.64,1),filter 0.15s;}
.coin-cell:active{transform:scale(0.88)!important;}
.coin-cell.selected{transform:scale(1.18);filter:brightness(1.4) drop-shadow(0 0 8px #fff8);}
.coin-cell.matched{animation:matchPop 0.4s ease forwards;}
.btn-primary{background:linear-gradient(135deg,#627EEA 0%,#8B5CF6 100%);border:none;color:#fff;padding:14px 36px;border-radius:30px;font-weight:700;font-size:16px;cursor:pointer;width:100%;box-shadow:0 4px 20px #627EEA55;transition:transform 0.12s;}
.btn-primary:active{transform:scale(0.97);}
.btn-secondary{background:transparent;border:1.5px solid #475569;color:#cbd5e1;padding:12px 28px;border-radius:30px;font-weight:600;font-size:15px;cursor:pointer;width:100%;transition:border-color 0.15s;}
.btn-secondary:active{border-color:#627EEA;color:#fff;}
.nav-btn{background:transparent;border:none;color:#94a3b8;font-size:13px;cursor:pointer;padding:6px 12px;border-radius:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const COINS=[
  {id:"BTC",color:"#F7931A",bg:"#FFF3E0",glow:"#F7931A",symbol:"₿"},
  {id:"ETH",color:"#627EEA",bg:"#EEF2FF",glow:"#627EEA",symbol:"Ξ"},
  {id:"DOGE",color:"#C3A634",bg:"#FFFDE7",glow:"#C3A634",symbol:"Ð"},
  {id:"LTC",color:"#BFBBBB",bg:"#F5F5F5",glow:"#9E9E9E",symbol:"Ł"},
  {id:"TRX",color:"#EF0027",bg:"#FFF0F0",glow:"#EF0027",symbol:"T"},
  {id:"USDT",color:"#26A17B",bg:"#E8F5E9",glow:"#26A17B",symbol:"₮"},
];
const GRID_SIZE=8;

function randomCoin(){return COINS[Math.floor(Math.random()*COINS.length)].id;}

function makeGrid(){
  const grid=[];
  for(let r=0;r<GRID_SIZE;r++){
    const row=[];
    for(let c=0;c<GRID_SIZE;c++){
      let id;
      do{id=randomCoin();}while(
        (c>=2&&row[c-1]===id&&row[c-2]===id)||
        (r>=2&&grid[r-1]&&grid[r-1][c]===id&&grid[r-2]&&grid[r-2][c]===id)
      );
      row.push(id);
    }
    grid.push(row);
  }
  return grid;
}

function findMatches(grid){
  const m=Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(false));
  for(let r=0;r<GRID_SIZE;r++)
    for(let c=0;c<GRID_SIZE-2;c++)
      if(grid[r][c]&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){
        let e=c+2;while(e+1<GRID_SIZE&&grid[r][e+1]===grid[r][c])e++;
        for(let k=c;k<=e;k++)m[r][k]=true;
      }
  for(let c=0;c<GRID_SIZE;c++)
    for(let r=0;r<GRID_SIZE-2;r++)
      if(grid[r][c]&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){
        let e=r+2;while(e+1<GRID_SIZE&&grid[e+1][c]===grid[r][c])e++;
        for(let k=r;k<=e;k++)m[k][c]=true;
      }
  return m;
}

function countM(m){return m.flat().filter(Boolean).length;}

function applyGravity(grid){
  const g=grid.map(r=>[...r]);
  for(let c=0;c<GRID_SIZE;c++){
    let e=GRID_SIZE-1;
    for(let r=GRID_SIZE-1;r>=0;r--){
      if(g[r][c]!==null){g[e][c]=g[r][c];if(e!==r)g[r][c]=null;e--;}
    }
    for(let r=e;r>=0;r--)g[r][c]=randomCoin();
  }
  return g;
}

function removeMatches(grid,m){return grid.map((row,r)=>row.map((cell,c)=>m[r][c]?null:cell));}

const LEVELS=[
  {level:1,target:500,moves:20,label:"Rookie Trader"},
  {level:2,target:1200,moves:22,label:"Market Watcher"},
  {level:3,target:2200,moves:24,label:"Crypto Analyst"},
  {level:4,target:3500,moves:26,label:"Bull Runner"},
  {level:5,target:5500,moves:28,label:"Whale Hunter"},
  {level:6,target:8000,moves:30,label:"DeFi Master"},
  {level:7,target:11000,moves:32,label:"Blockchain God"},
];

function CoinIcon({coinId,size=44,glowing=false}){
  const coin=COINS.find(c=>c.id===coinId);
  if(!coin)return null;
  return(
    <div style={{
      width:size,height:size,borderRadius:"50%",
      background:`radial-gradient(circle at 35% 35%,${coin.color}dd,${coin.color}88)`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*0.38,fontWeight:700,color:"#fff",
      border:`2px solid ${coin.color}`,
      boxShadow:glowing?`0 0 14px 4px ${coin.glow}88,0 0 4px ${coin.glow}`:`0 2px 6px ${coin.color}44`,
      userSelect:"none",flexShrink:0,
    }}>{coin.symbol}</div>
  );
}

function App(){
  const [screen,setScreen]=useState("menu");
  const [grid,setGrid]=useState(()=>makeGrid());
  const [selected,setSelected]=useState(null);
  const [matched,setMatched]=useState(null);
  const [animating,setAnimating]=useState(false);
  const [score,setScore]=useState(0);
  const [moves,setMoves]=useState(20);
  const [combo,setCombo]=useState(0);
  const [levelIdx,setLevelIdx]=useState(0);
  const [particles,setParticles]=useState([]);
  const [points,setPoints]=useState(()=>{try{return parseInt(localStorage.getItem("cm_pts")||"0");}catch{return 0;}});
  const [streak,setStreak]=useState(()=>{try{return parseInt(localStorage.getItem("cm_streak")||"0");}catch{return 0;}});
  const [dailyClaimed,setDailyClaimed]=useState(()=>{try{return localStorage.getItem("cm_daily")===new Date().toDateString();}catch{return false;}});
  const [highScore,setHighScore]=useState(()=>{try{return parseInt(localStorage.getItem("cm_high")||"0");}catch{return 0;}});
  const [toast,setToast]=useState(null);
  const [spinDeg,setSpinDeg]=useState(0);
  const [spinning,setSpinning]=useState(false);
  const [spinResult,setSpinResult]=useState(null);
  const [showAd,setShowAd]=useState(false);
  const [adCb,setAdCb]=useState(null);
  const [adWatched,setAdWatched]=useState(false);
  const pRef=useRef(0);
  const tRef=useRef(null);
  const level=LEVELS[levelIdx]||LEVELS[LEVELS.length-1];

  const savePoints=p=>{setPoints(p);try{localStorage.setItem("cm_pts",p);}catch{}};

  const showToast=(msg,color="#26A17B")=>{
    if(tRef.current)clearTimeout(tRef.current);
    setToast({msg,color});
    tRef.current=setTimeout(()=>setToast(null),2200);
  };

  const spawnParticles=useCallback((r,c,coinId,count=8)=>{
    const coin=COINS.find(x=>x.id===coinId);
    const id=++pRef.current;
    const np=Array.from({length:count},(_,i)=>({
      id:`${id}-${i}`,color:coin?.color||"#fff",
      x:(c+0.5)/GRID_SIZE*100,y:(r+0.5)/GRID_SIZE*100,
      vx:(Math.random()-0.5)*9,vy:(Math.random()-0.8)*9,
    }));
    setParticles(prev=>[...prev,...np]);
    setTimeout(()=>setParticles(prev=>prev.filter(p=>!np.find(n=>n.id===p.id))),900);
  },[]);

  const processMatches=useCallback(async(g,comboCount=0)=>{
    const m=findMatches(g);
    const cnt=countM(m);
    if(cnt===0){setCombo(0);setAnimating(false);return;}
    setMatched(m);
    for(let r=0;r<GRID_SIZE;r++)
      for(let c=0;c<GRID_SIZE;c++)
        if(m[r][c])spawnParticles(r,c,g[r][c],comboCount>0?12:7);
    const pts=Math.round(cnt*100*Math.pow(1.5,comboCount));
    setScore(prev=>prev+pts);
    setCombo(comboCount+1);
    if(comboCount>0)showToast(`🔥 ${comboCount+1}x COMBO! +${pts}`,"#F7931A");
    await new Promise(r=>setTimeout(r,420));
    setMatched(null);
    const cleared=removeMatches(g,m);
    await new Promise(r=>setTimeout(r,80));
    const dropped=applyGravity(cleared);
    setGrid(dropped);
    await new Promise(r=>setTimeout(r,300));
    return processMatches(dropped,comboCount+1);
  },[spawnParticles]);

  const handleCell=useCallback((r,c)=>{
    if(animating)return;
    if(!selected){setSelected([r,c]);return;}
    const[sr,sc]=selected;setSelected(null);
    const dr=Math.abs(r-sr),dc=Math.abs(c-sc);
    if(dr+dc!==1){setSelected([r,c]);return;}
    const ng=grid.map(row=>[...row]);
    [ng[sr][sc],ng[r][c]]=[ng[r][c],ng[sr][sc]];
    if(countM(findMatches(ng))===0){setSelected([sr,sc]);return;}
    setMoves(prev=>prev-1);setAnimating(true);setGrid(ng);
    processMatches(ng,0).then(()=>setAnimating(false));
  },[animating,selected,grid,processMatches]);

  useEffect(()=>{
    if(screen!=="game")return;
    if(score>=level.target&&!animating){
      const nh=Math.max(highScore,score);setHighScore(nh);
      try{localStorage.setItem("cm_high",nh);}catch{}
      savePoints(points+Math.floor(score/100));
      setTimeout(()=>setScreen("win"),500);
    }else if(moves<=0&&!animating){
      setTimeout(()=>setScreen("lose"),500);
    }
  },[score,moves,animating,screen]);

  const startGame=(idx=levelIdx)=>{
    setLevelIdx(idx);const lv=LEVELS[idx]||LEVELS[LEVELS.length-1];
    setGrid(makeGrid());setScore(0);setMoves(lv.moves);setCombo(0);
    setMatched(null);setSelected(null);setAnimating(false);setParticles([]);setAdWatched(false);
    setScreen("game");
  };

  const claimDaily=()=>{
    const bonus=50+streak*10;savePoints(points+bonus);
    const ns=streak+1;setStreak(ns);setDailyClaimed(true);
    try{localStorage.setItem("cm_daily",new Date().toDateString());localStorage.setItem("cm_streak",ns);}catch{}
    showToast(`🎁 +${bonus} points! Day ${ns} streak!`);
  };

  const doSpin=()=>{
    if(spinning)return;
    const prizes=[50,100,25,200,75,150,30,300];
    const idx=Math.floor(Math.random()*prizes.length);
    const deg=spinDeg+1440+(idx/prizes.length)*360;
    setSpinning(true);setSpinResult(null);setSpinDeg(deg);
    setTimeout(()=>{setSpinning(false);setSpinResult(prizes[idx]);savePoints(points+prizes[idx]);showToast(`🎰 Won +${prizes[idx]} points!`);},2800);
  };

  const watchAd=(cb)=>{setShowAd(true);setAdCb(()=>cb);};
  const adDone=()=>{setShowAd(false);setAdWatched(true);if(adCb)adCb();setAdCb(null);showToast("🎉 Ad reward granted!","#627EEA");};

  const progress=Math.min(score/level.target,1);
  const wheelPrizes=[50,100,25,200,75,150,30,300];
  const wheelColors=["#F7931A","#627EEA","#26A17B","#EF0027","#C3A634","#BFBBBB","#F7931A","#627EEA"];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0e1a 0%,#111827 50%,#0f172a 100%)",display:"flex",flexDirection:"column",alignItems:"center",position:"relative",overflow:"hidden"}}>
      
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 22px",borderRadius:30,fontWeight:700,fontSize:15,zIndex:9999,boxShadow:`0 4px 20px ${toast.color}88`,animation:"toastIn 0.3s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {showAd&&<div style={{position:"fixed",inset:0,background:"#000d",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#1e293b",borderRadius:20,padding:28,maxWidth:320,width:"90%",border:"1px solid #334155",textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:10}}>📺</div>
          <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>Rewarded Ad</div>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:20}}>Watch to earn your reward!</div>
          <div style={{background:"#0f172a",borderRadius:10,height:80,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontSize:12}}>[Ad Space — FaucetPay/AdSense]</div>
          <button className="btn-primary" onClick={adDone}>✓ Claim Reward</button>
        </div>
      </div>}

      {/* MENU */}
      {screen==="menu"&&<div style={{width:"100%",maxWidth:420,padding:"28px 16px",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
            {["BTC","ETH","DOGE","LTC","TRX","USDT"].map((id,i)=>(
              <div key={id} style={{animation:`float ${1.5+i*0.2}s ease-in-out infinite`,animationDelay:`${i*0.15}s`}}>
                <CoinIcon coinId={id} size={34}/>
              </div>
            ))}
          </div>
          <div style={{fontSize:34,fontWeight:900,letterSpacing:-1,background:"linear-gradient(135deg,#F7931A,#627EEA,#26A17B)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CryptoMatch</div>
          <div style={{color:"#64748b",fontSize:12,marginTop:3}}>Match. Earn. HODL. 🚀</div>
        </div>

        <div style={{background:"#1e293b",borderRadius:16,padding:"14px 16px",marginBottom:20,display:"flex",justifyContent:"space-around",border:"1px solid #334155"}}>
          <div style={{textAlign:"center"}}><div style={{color:"#64748b",fontSize:11}}>Points</div><div style={{color:"#26A17B",fontWeight:800,fontSize:19}}>{points.toLocaleString()}</div></div>
          <div style={{textAlign:"center"}}><div style={{color:"#64748b",fontSize:11}}>Streak</div><div style={{color:"#F7931A",fontWeight:800,fontSize:19}}>🔥{streak}d</div></div>
          <div style={{textAlign:"center"}}><div style={{color:"#64748b",fontSize:11}}>Best</div><div style={{color:"#627EEA",fontWeight:800,fontSize:19}}>{highScore.toLocaleString()}</div></div>
        </div>

        {!dailyClaimed&&<div onClick={claimDaily} style={{background:"linear-gradient(135deg,#1e3a1f,#14532d)",border:"1px solid #16a34a",borderRadius:16,padding:"12px 16px",marginBottom:14,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:28}}>🎁</div>
          <div><div style={{fontWeight:700,color:"#4ade80",fontSize:14}}>Daily Login Reward!</div><div style={{color:"#86efac",fontSize:12}}>Tap to claim +{50+streak*10} points</div></div>
        </div>}

        <div style={{marginBottom:18}}>
          <div style={{color:"#94a3b8",fontSize:12,marginBottom:10,fontWeight:600}}>SELECT LEVEL</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {LEVELS.map((lv,i)=>(
              <button key={i} onClick={()=>{setLevelIdx(i);startGame(i);}} style={{background:i===levelIdx?"linear-gradient(135deg,#627EEA,#8B5CF6)":"#1e293b",border:i===levelIdx?"none":"1px solid #334155",borderRadius:12,padding:"10px 8px",cursor:"pointer",color:"#fff",textAlign:"center"}}>
                <div style={{fontSize:16}}>{["🐣","📈","🔍","🐂","🐋","🌐","⛓"][i]}</div>
                <div style={{fontSize:11,fontWeight:700,marginTop:2}}>Lv.{lv.level}</div>
                <div style={{fontSize:10,color:i===levelIdx?"#c4b5fd":"#64748b"}}>{lv.moves}✦</div>
              </button>
            ))}
          </div>
        </div>

        <button className="btn-primary" onClick={()=>startGame(levelIdx)} style={{marginBottom:10}}>🚀 Play Level {level.level}</button>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-secondary" style={{flex:1,fontSize:12}} onClick={()=>setScreen("spin")}>🎰 Spin</button>
          <button className="btn-secondary" style={{flex:1,fontSize:12}} onClick={()=>setScreen("leaderboard")}>🏆 Ranks</button>
          <button className="btn-secondary" style={{flex:1,fontSize:12}} onClick={()=>setScreen("withdraw")}>💸 Cash</button>
        </div>
      </div>}

      {/* GAME */}
      {screen==="game"&&<div style={{width:"100%",maxWidth:420,padding:"10px 8px",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button className="nav-btn" onClick={()=>setScreen("menu")}>← Menu</button>
          <div style={{fontWeight:800,color:"#627EEA",fontSize:13}}>Lv.{level.level}: {level.label}</div>
          <div style={{color:"#64748b",fontSize:12}}>⭐{score.toLocaleString()}</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {[["SCORE",score.toLocaleString(),"#26A17B"],["MOVES",moves,moves<=5?"#EF0027":"#F7931A"],["COMBO","x"+Math.max(combo,1),"#627EEA"]].map(([l,v,clr])=>(
            <div key={l} style={{flex:1,background:"#1e293b",borderRadius:10,padding:"8px 10px",border:"1px solid #334155"}}>
              <div style={{color:"#64748b",fontSize:10}}>{l}</div>
              <div style={{color:clr,fontWeight:800,fontSize:17}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:3}}>
            <span>Progress</span><span>{Math.round(progress*100)}%</span>
          </div>
          <div style={{background:"#1e293b",borderRadius:99,height:7,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:99,width:`${progress*100}%`,background:"linear-gradient(90deg,#627EEA,#26A17B)",transition:"width 0.5s ease"}}/>
          </div>
        </div>
        <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"1px solid #1e3a5f",background:"#0f172a",padding:5,boxShadow:"0 8px 32px #627EEA22"}}>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${GRID_SIZE},1fr)`,gap:3,position:"relative"}}>
            {grid.map((row,r)=>row.map((coinId,c)=>{
              const isSel=selected&&selected[0]===r&&selected[1]===c;
              const isMat=matched&&matched[r][c];
              return(
                <div key={`${r}-${c}`} className={`coin-cell${isSel?" selected":""}${isMat?" matched":""}`} onClick={()=>handleCell(r,c)} style={{cursor:animating?"default":"pointer",aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {coinId&&<CoinIcon coinId={coinId} size={34} glowing={isSel}/>}
                </div>
              );
            }))}
          </div>
          {particles.map(p=>(
            <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:`${p.y}%`,width:7,height:7,borderRadius:"50%",background:p.color,pointerEvents:"none",animation:"particleFly 0.9s ease forwards","--tx":`${p.vx*12}px`,"--ty":`${p.vy*12}px`,boxShadow:`0 0 4px ${p.color}`}}/>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button className="btn-secondary" style={{flex:1,fontSize:12}} onClick={()=>watchAd(()=>setMoves(m=>m+5))}>📺 +5 Moves</button>
          <button className="btn-secondary" style={{flex:1,fontSize:12}} onClick={()=>watchAd(()=>setScore(s=>s+Math.floor(level.target*0.2)))}>📺 Boost</button>
        </div>
      </div>}

      {/* WIN */}
      {screen==="win"&&<div style={{width:"100%",maxWidth:420,padding:"36px 20px",textAlign:"center",zIndex:1}}>
        <div style={{fontSize:64,marginBottom:10,animation:"float 2s ease-in-out infinite"}}>🏆</div>
        <div style={{fontSize:28,fontWeight:900,background:"linear-gradient(135deg,#F7931A,#ffd700)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>LEVEL CLEARED!</div>
        <div style={{color:"#94a3b8",marginBottom:20}}>Level {level.level} — {level.label}</div>
        <div style={{background:"#1e293b",borderRadius:16,padding:20,marginBottom:20,border:"1px solid #334155",display:"flex",justifyContent:"space-around"}}>
          <div><div style={{color:"#64748b",fontSize:12}}>Score</div><div style={{color:"#26A17B",fontWeight:800,fontSize:22}}>{score.toLocaleString()}</div></div>
          <div><div style={{color:"#64748b",fontSize:12}}>Earned</div><div style={{color:"#F7931A",fontWeight:800,fontSize:22}}>+{Math.floor(score/100)} pts</div></div>
        </div>
        {!adWatched&&<div style={{background:"#1e1a3a",border:"1px solid #7c3aed",borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:"#c4b5fd",fontWeight:700,marginBottom:8,fontSize:14}}>🎬 Watch Ad for 2× Reward!</div>
          <button className="btn-primary" onClick={()=>watchAd(()=>{savePoints(points+Math.floor(score/50));showToast("2× Reward added! 🎉");})}>📺 Double Points</button>
        </div>}
        {levelIdx<LEVELS.length-1?<button className="btn-primary" style={{marginBottom:10}} onClick={()=>startGame(levelIdx+1)}>▶ Next Level</button>
        :<button className="btn-primary" style={{marginBottom:10}} onClick={()=>startGame(levelIdx)}>🔄 Play Again</button>}
        <button className="btn-secondary" onClick={()=>setScreen("menu")}>← Main Menu</button>
      </div>}

      {/* LOSE */}
      {screen==="lose"&&<div style={{width:"100%",maxWidth:420,padding:"36px 20px",textAlign:"center",zIndex:1}}>
        <div style={{fontSize:56,marginBottom:10}}>😢</div>
        <div style={{fontSize:26,fontWeight:900,color:"#EF0027",marginBottom:4}}>OUT OF MOVES</div>
        <div style={{color:"#94a3b8",marginBottom:20}}>Score: {score.toLocaleString()} / {level.target.toLocaleString()}</div>
        {!adWatched&&<div style={{background:"#1e1a3a",border:"1px solid #7c3aed",borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:"#c4b5fd",fontWeight:700,marginBottom:8,fontSize:14}}>💪 Continue with +5 Moves?</div>
          <button className="btn-primary" onClick={()=>watchAd(()=>{setMoves(5);setScreen("game");})}>📺 Watch Ad — Continue!</button>
        </div>}
        <button className="btn-primary" style={{marginBottom:10}} onClick={()=>startGame(levelIdx)}>🔄 Retry</button>
        <button className="btn-secondary" onClick={()=>setScreen("menu")}>← Main Menu</button>
      </div>}

      {/* SPIN */}
      {screen==="spin"&&<div style={{width:"100%",maxWidth:420,padding:"20px 16px",textAlign:"center",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
          <button className="nav-btn" onClick={()=>setScreen("menu")}>← Back</button>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>🎰 Lucky Spin</div>
        </div>
        <div style={{position:"relative",width:250,height:250,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="250" height="250" viewBox="0 0 250 250" style={{transform:`rotate(${spinDeg}deg)`,transition:spinning?"transform 2.5s cubic-bezier(.17,.67,.12,.99)":"none"}}>
            {wheelPrizes.map((prize,i)=>{
              const angle=(2*Math.PI)/wheelPrizes.length;
              const sa=i*angle-Math.PI/2,ea=sa+angle;
              const r=115,cx=125,cy=125;
              const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
              const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
              const ma=(sa+ea)/2;
              const tx=cx+78*Math.cos(ma),ty=cy+78*Math.sin(ma);
              return(<g key={i}><path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`} fill={wheelColors[i]} opacity={0.9}/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="central" fill="#fff" fontSize="11" fontWeight="700">{prize}</text></g>);
            })}
            <circle cx="125" cy="125" r="18" fill="#0f172a"/><circle cx="125" cy="125" r="14" fill="#627EEA"/>
          </svg>
          <div style={{position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:"22px solid #F7931A",filter:"drop-shadow(0 2px 4px #F7931A88)"}}/>
        </div>
        {spinResult&&<div style={{background:"#1e293b",borderRadius:14,padding:14,marginBottom:18,border:"1px solid #26A17B"}}><span style={{color:"#4ade80",fontWeight:800,fontSize:17}}>🎉 Won +{spinResult} points!</span></div>}
        <button className="btn-primary" onClick={doSpin} disabled={spinning} style={{marginBottom:10}}>{spinning?"Spinning...":"🎰 Free Spin"}</button>
        <button className="btn-secondary" onClick={()=>watchAd(doSpin)}>📺 Watch Ad for Extra Spin</button>
      </div>}

      {/* LEADERBOARD */}
      {screen==="leaderboard"&&<div style={{width:"100%",maxWidth:420,padding:"20px 16px",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
          <button className="nav-btn" onClick={()=>setScreen("menu")}>← Back</button>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>🏆 Leaderboard</div>
        </div>
        {[{name:"CryptoKing99",pts:48200,streak:14,flag:"🇺🇸"},{name:"BTCWhale",pts:41000,streak:9,flag:"🇬🇧"},{name:"ETHmaxi",pts:38750,streak:7,flag:"🇩🇪"},{name:"DogeArmy",pts:31200,streak:12,flag:"🇧🇷"},{name:"SatoshiMaster",pts:28600,streak:5,flag:"🇯🇵"},{name:"You",pts:points,streak,flag:"⭐"}].sort((a,b)=>b.pts-a.pts).map((user,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:user.name==="You"?"#1e293b":"#111827",border:`1px solid ${user.name==="You"?"#627EEA":"#1e293b"}`,borderRadius:12,padding:"10px 14px",marginBottom:8}}>
            <div style={{width:26,fontWeight:800,fontSize:14,color:["#FFD700","#C0C0C0","#CD7F32"][i]||"#64748b"}}>{i<3?["🥇","🥈","🥉"][i]:`#${i+1}`}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{user.flag} {user.name}</div><div style={{color:"#64748b",fontSize:11}}>🔥{user.streak}d streak</div></div>
            <div style={{color:"#26A17B",fontWeight:800,fontSize:14}}>{user.pts.toLocaleString()}</div>
          </div>
        ))}
      </div>}

      {/* WITHDRAW */}
      {screen==="withdraw"&&<div style={{width:"100%",maxWidth:420,padding:"20px 16px",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
          <button className="nav-btn" onClick={()=>setScreen("menu")}>← Back</button>
          <div style={{flex:1,fontWeight:800,fontSize:17}}>💸 Withdraw</div>
        </div>
        <div style={{background:"#1e293b",borderRadius:14,padding:18,marginBottom:16,border:"1px solid #334155"}}>
          <div style={{color:"#64748b",fontSize:12}}>Balance</div>
          <div style={{fontSize:26,fontWeight:900,color:"#26A17B"}}>{points.toLocaleString()} pts</div>
          <div style={{color:"#64748b",fontSize:12}}>≈ ${(points/10000*0.1).toFixed(4)} USD</div>
        </div>
        <div style={{background:"#1e1a20",borderRadius:14,padding:14,marginBottom:16,border:"1px solid #EF002744"}}>
          <div style={{color:"#fca5a5",fontSize:13,fontWeight:700,marginBottom:6}}>📋 Via FaucetPay</div>
          <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.8}}>• Min DOGE: 1.00 (5,000 pts)<br/>• Min LTC: 0.001 (8,000 pts)<br/>• Min TRX: 5.00 (6,000 pts)<br/>• Admin approval within 24h</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {["DOGE","LTC","TRX"].map(id=>(
            <div key={id} style={{flex:1,background:"#1e293b",borderRadius:10,padding:10,textAlign:"center",border:"1px solid #334155",cursor:"pointer"}}>
              <CoinIcon coinId={id} size={28}/><div style={{fontSize:11,marginTop:4,fontWeight:700}}>{id}</div>
            </div>
          ))}
        </div>
        <input placeholder="FaucetPay wallet address" style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
        <button className="btn-primary" onClick={()=>{if(points<5000){showToast("Need 5,000 points minimum!","#EF0027");return;}showToast("Request submitted! Review in 24h ⏳","#F7931A");}}>Submit Withdrawal</button>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
